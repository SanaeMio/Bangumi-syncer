<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <script>window.__APP_BASE_PATH__ = {{ public_base_path_json() }};</script>
        <script>
        (function(){
            var t=localStorage.getItem('app-theme');
            if(!t) t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
            var c=localStorage.getItem('app-color')||'sakura';
            if(c==='eggyolk'||c==='sapphire')c='sakura';
            document.documentElement.setAttribute('data-theme',t);
            document.documentElement.setAttribute('data-color',c);
            document.documentElement.style.colorScheme=t==='dark'?'dark':'light';
        })();
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trakt 授权成功 - Bangumi Syncer</title>
        <link href="{{ '/static/css/bootstrap.min.css' | static_v }}"
              rel="stylesheet">
        <link href="{{ '/static/css/bootstrap-icons.css' | static_v }}"
              rel="stylesheet">
        <link href="{{ '/static/css/style.css' | static_v }}" rel="stylesheet">
    </head>
    <body class="app-body">
        <div class="container px-3">
            <div class="auth-standalone-card">
                <div class="auth-standalone-icon auth-standalone-icon--success">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h2>授权成功！</h2>
                <p class="text-muted">Trakt.tv 授权已完成。</p>
                <p class="text-muted">现在可以关闭此窗口并返回配置页面。</p>
                <div class="mt-4">
                    <button id="close-button" class="btn btn-primary">
                        <i class="bi bi-x-circle me-2"></i>关闭窗口
                    </button>
                </div>
            </div>
        </div>
        <script>
        try {
            if (window.opener && !window.opener.closed) {
                window.opener.postMessage({
                    type: 'trakt_auth_success',
                    timestamp: Date.now()
                }, window.location.origin);

                if (typeof window.opener.handleTraktAuthSuccess === 'function') {
                    window.opener.handleTraktAuthSuccess();
                }
            }
        } catch (e) {
            console.log('无法与父窗口通信:', e);
        }

        document.getElementById('close-button').addEventListener('click', function() {
            window.close();
        });

        setTimeout(function() {
            if (!window.closed) {
                try {
                    window.close();
                } catch (e) {
                    console.log('无法自动关闭窗口:', e);
                }
            }
        }, 3000);
        </script>
    </body>
</html>

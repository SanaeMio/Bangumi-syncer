name: 功能建议
description: 提出新能力或对产品行为的改进设想（区别于纯优化类议题）
title: "[Feature] "
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        建议先查阅 [在线文档](https://sanaemio.github.io/Bangumi-syncer/)，确认是否已有现成能力或配置可避免重复需求。
  - type: textarea
    id: use_case
    attributes:
      label: 使用场景
      description: 你在什么情况下需要它？解决什么问题？
    validations:
      required: true
  - type: textarea
    id: desired_behavior
    attributes:
      label: 希望实现的行为
      description: 你期望产品如何工作？可包含界面、接口、配置项等设想。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 若没有该功能，你目前如何 workaround？是否有可接受的折中？
  - type: checkboxes
    id: contribution
    attributes:
      label: 参与实现
      options:
        - label: 我愿意在讨论确定方案后尝试提交 PR
          required: false

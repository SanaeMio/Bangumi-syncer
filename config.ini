##########################bangumi设置############################

[bangumi]

# bangumi 的用户名或 UID。如果设置了用户名，只能填用户名。
# UID 就是个人资料页里 @123456 或者网址 bgm.tv/user/123456 的数字部分。例如：123456
username = 

# 令牌，注意有效期。生成网址：https://next.bgm.tv/demo/access-token
# 例如：hsdkxI4l7tUhMgo1MskxRn35qqFl5Ie5cCJ
access_token = 

# 观看记录是否仅自己可见。公开则填 False。
private = False

##########################多账号bangumi设置##########################
# 多账号模式下的配置，格式为 [bangumi-用户名]
# 当 sync.mode = multi 时，会根据媒体服务器用户名映射到对应的 bangumi 账号

# 示例配置1：
# [bangumi-user1]
# username = bangumi_user1
# access_token = token1
# private = False

# 示例配置2：
# [bangumi-user2] 
# username = bangumi_user2
# access_token = token2
# private = True

##########################bangumi-data设置###########################

[bangumi-data]

# 是否启用 bangumi-data 匹配
# 启用后会先尝试通过 bangumi-data 匹配番剧ID，匹配成功后可以减少API请求次数
enabled = True

# bangumi-data 数据源URL
# 可以修改为其他可访问的地址
data_url = https://unpkg.com/bangumi-data@0.3/dist/data.json

# 是否使用本地缓存文件，默认启用
# 启用后会将下载的数据保存到本地，之后再次启动时优先使用缓存
use_cache = True

# 本地缓存文件路径，默认在当前目录
local_cache_path = ./bangumi_data_cache.json

# 缓存有效期（天），超过此时间后会自动更新缓存
# 设置为0表示每次启动都会更新缓存
cache_ttl_days = 7

# bangumi-data 请求代理，为空则使用 script_proxy
http_proxy = 

##########################同步设置################################

[sync]

# 单用户模式还是多用户模式
# single: 单用户模式，只同步一个用户。（默认）
# multi: 多用户模式，同步多个用户。
mode = single

# 单用户模式用户名（Plex/Emby/Jellyfin中的用户名）
# 用于跳过无需同步的用户提交的记录，只同步配置中的用户名产生的记录
single_username = 

# 多用户模式用户映射配置
# 格式：媒体服务器用户名 = bangumi配置段名
# 例如：plex_user1 = bangumi-user1
# 这样当 plex_user1 观看完成时，会使用 [bangumi-user1] 段的配置同步到对应的 bangumi 账号

# 示例配置：
# plex_user1 = bangumi-user1
# plex_user2 = bangumi-user2
# emby_user1 = bangumi-user1

# 屏蔽关键词列表，用逗号分隔
# 当番剧标题包含这些关键词时，将跳过同步处理
# 支持中文、英文、日文等多种语言的关键词
blocked_keywords = 

##########################Web认证设置#############################

[auth]

# 是否启用Web管理界面认证，建议在外网环境下启用
# True: 启用认证，需要登录才能访问管理界面
# False: 禁用认证，允许无需登录直接访问（仅适用于内网环境）
enabled = True

# 管理员用户名
username = admin

# 管理员密码，首次设置后会自动加密保存
password = admin

# 会话超时时间（秒），默认1小时
session_timeout = 3600

# 会话密钥，用于加密，自动生成，一般无需修改
secret_key = 

# 是否启用HTTPS安全Cookie，在使用HTTPS时建议启用
# True: Cookie设置secure标志，只在HTTPS下传输
# False: Cookie可在HTTP下传输（默认，适用于内网HTTP环境）
https_only = False

# 登录失败保护设置
# 最大登录失败次数，超过后将锁定IP
max_login_attempts = 5

# IP锁定时间（秒），默认15分钟
lockout_duration = 900

# Webhook认证密钥，用于Plex/Emby/Jellyfin webhook的认证
# 自动生成，一般无需修改
webhook_key = 

# 是否启用Webhook认证
# True: 启用认证，webhook请求需要提供密钥才能访问（推荐用于外网环境）
# False: 禁用认证，webhook请求可直接访问无需密钥（适用于内网环境）
webhook_auth_enabled = False

##########################通知设置################################
# 通知配置已迁移到新的多配置段格式, 配置由前端修改动态生成
# 旧的单配置段 [notification] 已弃用
# 新格式支持多个 webhook 和 email 配置，每个配置可以独立设置支持的通知类型

# Webhook 通知配置示例
# 格式：[webhook-数字]
# 支持的通知类型（types）：
#   - all: 所有通知类型
#   - request_received: 收到同步请求
#   - bangumi_id_found: 匹配到番剧
#   - mark_success: 同步成功
#   - mark_failed: 同步失败
#   - mark_skipped: 已看过，跳过
#   - config_error: 配置错误
#   - anime_not_found: 未找到番剧
#   - episode_not_found: 未找到剧集
#   - api_auth_error: API认证失败
#   - api_error: API错误
#   - api_retry_failed: API重试失败
#   - ip_locked: IP被锁定
# 多个类型用逗号分隔，例如：mark_failed,mark_success

# 示例1：钉钉 Webhook 配置
# [webhook-1]
# id = 1
# enabled = True
# url = https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN
# method = POST
# headers = Content-Type: application/json
# template = {"msgtype": "text", "text": {"content": "🚨 Bangumi-Syncer通知\n时间: {timestamp}\n类型: {notification_type}\n番剧: {title} S{season}E{episode}\n用户: {user_name}"}}
# types = mark_failed,mark_success

# 示例2：企业微信 Webhook 配置
# [webhook-2]
# id = 2
# enabled = True
# url = https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY
# method = POST
# headers = Content-Type: application/json
# template = {"msgtype": "text", "text": {"content": "Bangumi-Syncer通知\n时间: {timestamp}\n类型: {notification_type}\n番剧: {title} S{season}E{episode}"}}
# types = all

# 邮件通知配置示例
# 格式：[email-数字]

# 示例1：QQ邮箱配置
# [email-1]
# id = 1
# enabled = True
# smtp_server = smtp.qq.com
# smtp_port = 465
# smtp_username = your_email@qq.com
# smtp_password = your_authorization_code
# smtp_use_tls = True
# email_from = your_email@qq.com
# email_to = receiver@example.com
# email_subject = [Bangumi-Syncer] {notification_type} - {title} S{season}E{episode}
# email_template_file = 
# types = mark_failed,mark_success

# 示例2：Gmail配置
# [email-2]
# id = 2
# enabled = True
# smtp_server = smtp.gmail.com
# smtp_port = 587
# smtp_username = your_email@gmail.com
# smtp_password = your_app_password
# smtp_use_tls = True
# email_from = your_email@gmail.com
# email_to = receiver@example.com
# email_subject = Bangumi-Syncer通知
# email_template_file = 
# types = all

##########################其他设置################################

[dev]

# 脚本的 http 代理，例如 http://127.0.0.1:7890。
# 若用 OpenClash 可能慢，原因未知，可尝试 CFW 或透明代理等。
# 
# Docker环境代理配置说明：
# - bridge模式：使用 http://172.17.0.1:端口 或 http://host.docker.internal:端口
# - host模式：使用 http://127.0.0.1:端口
# - 群晖NAS：使用 http://宿主机IP:端口
script_proxy =

# SSL证书验证，当使用代理时可能需要关闭。True为验证，False为不验证。
# 注意：关闭SSL验证会降低安全性，仅在代理环境下出现SSL错误时使用。
# 建议：如果没有使用代理或代理工作正常，请设置为 True
ssl_verify = True

# 日志路径，可填写 ./log.txt 或者 绝对路径。超过10MB时会重置。留空则禁用。
log_file = ./log.txt

# 是否开启debug模式，一般不用开。
debug = False

[trakt]
client_id = 
client_secret = 
redirect_uri = http://localhost:8000/api/trakt/auth/callback
default_sync_interval = 0 */6 * * *
default_enabled = True

[scheduler]
startup_delay = 30
max_concurrent_syncs = 3
job_timeout = 300
max_retries = 3
retry_delay = 60